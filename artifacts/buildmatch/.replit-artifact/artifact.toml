kind = "mobile"
previewPath = "/"
title = "BuildMatch"
version = "1.0.0"
id = "artifacts/buildmatch"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25671

[services.development]
run = "pnpm --filter @workspace/buildmatch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buildmatch", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/buildmatch", "run", "serve" ]

[services.env]
PORT = "25671"
BASE_PATH = "/"
