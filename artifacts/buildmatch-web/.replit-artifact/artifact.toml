kind = "web"
previewPath = "/web"
title = "BuildMatch — Marketing Site"
version = "1.0.0"
id = "artifacts/buildmatch-web"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/web" ]
localPort = 8082

[services.development]
run = "pnpm --filter @workspace/buildmatch-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/buildmatch-web", "run", "build" ]
publicDir = "artifacts/buildmatch-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "8082"
BASE_PATH = "/web"
